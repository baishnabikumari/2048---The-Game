<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Endless</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<button id="btn-theme" title="toggle theme">☀</button>

<div id="mode-wrap">
    <div id="mode-opts">
        <button class="mopt" data-m="arr">keys</button>
        <button class="mopt" data-m="swipe">swipe</button>
        <button class="mopt" data-m="both">both</button>
    </div>
    <button id="btn-mode">both</button>
</div>
<div id="app">
    <header>
        <div class="brand">
            <h1>2048</h1>
            <p class="tag">endless</p>
        </div>
        <div class="hud">
            <div class="sbox">
                <span class="slabel">score</span>
                <span class="sval" id="score">0</span>
            </div>
            <div class="sbox">
                <span class="slabel">best</span>
                <span class="sval" id="best">0</span>
            </div>
            <button id="btn-new">new</button>
        </div>
    </header>

    <div id="board">
        <div id="cells"></div>
        <div id="tiles"></div>
        <div id="gameover" class="hidden">
            <p>no move left</p>
            <button id="btn-retry">try again</button>
        </div>
    </div>

    <p class="hint">← → ↑ ↓ &nbsp;·&nbsp; swipe on mobile</p>

</div>
<script src="theme.js"></script>
<script src="game.js"></script>
</body>
</html>
